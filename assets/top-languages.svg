<svg xmlns="http://www.w3.org/2000/svg" width="495" height="280" viewBox="0 0 495 280" role="img" aria-labelledby="title desc">
  <title id="title">Top Languages</title>
  <desc id="desc">Local top languages and engineering stack card for vtino17 profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60A5FA"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
    <style>
      .title{font:700 20px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD}
      .sub{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#A5B4FC}
      .label{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#E5E7EB}
      .pct{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD;text-anchor:end}
      .track{fill:#1F2937;stroke:#312E81;stroke-width:1}
    </style>
  </defs>
  <rect width="495" height="280" rx="12" fill="url(#bg)"/>
  <rect x="18" y="18" width="459" height="244" rx="10" fill="#0B1020" stroke="#312E81" stroke-width="1" opacity=".86"/>
  <text x="32" y="48" class="title">Top Languages &amp; Stack</text>
  <text x="32" y="70" class="sub">focused stack for networking, systems, security, IoT, and AI tooling</text>
  <g transform="translate(32 98)">
    <text x="0" y="0" class="label">Python</text><text x="430" y="0" class="pct">Automation</text><rect x="0" y="12" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="12" width="365" height="9" rx="4.5" fill="url(#bar1)"/>
    <text x="0" y="36" class="label">JavaScript / TypeScript</text><text x="430" y="36" class="pct">Web Tools</text><rect x="0" y="48" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="48" width="326" height="9" rx="4.5" fill="url(#bar2)"/>
    <text x="0" y="72" class="label">Bash / Linux</text><text x="430" y="72" class="pct">SysAdmin</text><rect x="0" y="84" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="84" width="300" height="9" rx="4.5" fill="url(#bar1)"/>
    <text x="0" y="108" class="label">PHP / MySQL</text><text x="430" y="108" class="pct">Backend</text><rect x="0" y="120" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="120" width="258" height="9" rx="4.5" fill="url(#bar2)"/>
    <text x="0" y="144" class="label">C / C++</text><text x="430" y="144" class="pct">Systems</text><rect x="0" y="156" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="156" width="230" height="9" rx="4.5" fill="url(#bar1)"/>
    <text x="0" y="180" class="label">IoT / Device Logic</text><text x="430" y="180" class="pct">Telemetry</text><rect x="0" y="192" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="192" width="198" height="9" rx="4.5" fill="url(#bar2)"/>
  </g>
</svg>
