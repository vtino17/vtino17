<svg xmlns="http://www.w3.org/2000/svg" width="495" height="220" viewBox="0 0 495 220" role="img" aria-labelledby="title desc">
  <title id="title">Top Languages</title>
  <desc id="desc">Local top languages card for vtino17 profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60A5FA"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
    <style>
      .title{font:700 20px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD}
      .sub{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#A5B4FC}
      .label{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#E5E7EB}
      .pct{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD}
      .track{fill:#1F2937;stroke:#312E81;stroke-width:1}
    </style>
  </defs>
  <rect width="495" height="220" rx="12" fill="url(#bg)"/>
  <rect x="18" y="18" width="459" height="184" rx="10" fill="#0B1020" stroke="#312E81" stroke-width="1" opacity=".86"/>
  <text x="32" y="48" class="title">Top Languages</text>
  <text x="32" y="70" class="sub">profile stack while public code language data is building</text>
  <g transform="translate(32 92)">
    <text x="0" y="0" class="label">Python</text><text x="390" y="0" class="pct">Core</text><rect x="0" y="10" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="10" width="356" height="9" rx="4.5" fill="url(#bar1)"/>
    <text x="0" y="34" class="label">JavaScript</text><text x="390" y="34" class="pct">Core</text><rect x="0" y="44" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="44" width="326" height="9" rx="4.5" fill="url(#bar2)"/>
    <text x="0" y="68" class="label">TypeScript</text><text x="390" y="68" class="pct">Product</text><rect x="0" y="78" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="78" width="278" height="9" rx="4.5" fill="url(#bar1)"/>
    <text x="0" y="102" class="label">C / C++</text><text x="390" y="102" class="pct">Systems</text><rect x="0" y="112" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="112" width="238" height="9" rx="4.5" fill="url(#bar2)"/>
    <text x="0" y="136" class="label">Java / Go</text><text x="390" y="136" class="pct">Backend</text><rect x="0" y="146" width="430" height="9" rx="4.5" class="track"/><rect x="0" y="146" width="205" height="9" rx="4.5" fill="url(#bar1)"/>
  </g>
</svg>
