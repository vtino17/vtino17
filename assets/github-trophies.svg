<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Trophies</title>
  <desc id="desc">Local trophy-style engineering focus card for vtino17.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font:800 24px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD}
      .sub{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#A5B4FC}
      .name{font:800 14px 'Segoe UI',Arial,sans-serif;fill:#FFFFFF;text-anchor:middle}
      .detail{font:600 11px 'Segoe UI',Arial,sans-serif;fill:#C4B5FD;text-anchor:middle}
      .box{fill:#0B1020;stroke:#312E81;stroke-width:1.2}
      .cup{fill:none;stroke:url(#edge);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
    </style>
  </defs>
  <rect width="1000" height="220" rx="16" fill="url(#bg)"/>
  <text x="38" y="44" class="title">Engineering Focus</text>
  <text x="38" y="66" class="sub">networking, systems, cybersecurity, IoT, AI, and product-minded delivery</text>
  <g transform="translate(38 92)">
    <g transform="translate(0 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">NETWORK</text><text class="detail" x="71" y="78">ENGINEERING</text></g>
    <g transform="translate(154 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">SYSADMIN</text><text class="detail" x="71" y="78">LINUX / SERVER</text></g>
    <g transform="translate(308 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">CYBERSEC</text><text class="detail" x="71" y="78">DEFENSIVE</text></g>
    <g transform="translate(462 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">IoT</text><text class="detail" x="71" y="78">TELEMETRY</text></g>
    <g transform="translate(616 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">AI</text><text class="detail" x="71" y="78">AUTOMATION</text></g>
    <g transform="translate(770 0)"><rect class="box" width="142" height="90" rx="12"/><path class="cup" d="M55 22 h32 v20 c0 15-9 25-16 25s-16-10-16-25z M52 28 h-12 c0 16 8 24 18 26 M90 28 h12 c0 16-8 24-18 26 M64 68 h14 M58 78 h26"/><text class="name" x="71" y="28">PRODUCT</text><text class="detail" x="71" y="78">SECURITY TOOLS</text></g>
  </g>
</svg>
