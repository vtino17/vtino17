<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220" role="img" aria-labelledby="title desc">
  <title id="title">Contribution Snake</title>
  <desc id="desc">Animated purple contribution snake graphic for GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .cell{fill:#1F2937;stroke:#312E81;stroke-width:1;opacity:.72}
      .hot{fill:#6D28D9;opacity:.9}
      .mid{fill:#4F46E5;opacity:.78}
      .low{fill:#3730A3;opacity:.66}
      .path{fill:none;stroke:url(#snake);stroke-width:12;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:980;animation:dash 7s linear infinite;filter:url(#glow)}
      .head{fill:#C084FC;filter:url(#glow);animation:pulse 1.8s ease-in-out infinite}
      .txt{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:700;letter-spacing:.08em;fill:#C4B5FD}
      @keyframes dash{from{stroke-dashoffset:980}to{stroke-dashoffset:0}}
      @keyframes pulse{0%,100%{r:10;opacity:.9}50%{r:15;opacity:1}}
    </style>
  </defs>
  <rect width="1000" height="220" rx="18" fill="url(#bg)"/>
  <g transform="translate(44 50)">
    <text class="txt" x="0" y="-18" font-size="15">CONTRIBUTION ACTIVITY</text>
